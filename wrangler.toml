# One Worker serves both the site and the Ask endpoint.
#
# Cloudflare tries to match each request against a file in `public` first.
# Anything with no matching file — /ask — falls through to src/index.js.
# Because the page and the endpoint share an origin, there is no CORS, no
# preflight, and no ALLOWED_ORIGIN to keep in sync.

name = "ketogenesis"
main = "src/index.js"
compatibility_date = "2026-07-01"

[assets]
directory = "./public"

[observability]
enabled = true

[vars]
CEREBRAS_MODEL = "gpt-oss-120b"

# Longest customer question accepted, in characters. Longer questions are
# trimmed, not rejected. The real ceiling is the model's context window,
# which leaves roughly 28,000 characters of headroom.
MAX_QUERY_CHARS = "1000"

# CEREBRAS_API_KEY is a secret, never a var. Set it in the Cloudflare
# dashboard (Settings -> Variables and Secrets -> Encrypt), or with:
#   npx wrangler secret put CEREBRAS_API_KEY
