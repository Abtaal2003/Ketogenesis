# One Worker serves both the site and the Ask endpoint.
#
# Cloudflare tries to match each request against a file in `public` first.
# Anything with no matching file — /ask — falls through to src/index.js.
# Because the page and the endpoint share an origin, there is no CORS, no
# preflight, and no ALLOWED_ORIGIN to keep in sync.

name = "ketogenesis"
main = "src/index.js"
compatibility_date = "2026-07-01"

# Runs before every deploy — including Cloudflare's Git-integration
# builds, which invoke `npx wrangler deploy`. It regenerates
# public/menu.json and src/menu.js from tools/catalogue.xlsx, so the
# whole update flow is: replace the .xlsx on GitHub, push, done. No CSV
# step, no Python, no editing generated files by hand.
[build]
command = "npm install && node tools/build_menu.mjs"

[assets]
directory = "./public"

[observability]
enabled = true

[vars]
# Which LLM answers /ask: "cerebras" or "gemini". Change this one line
# and redeploy to switch providers — no code change needed. Defaults to
# "cerebras" if omitted. The chosen provider must have its API key set
# as a secret (see below); if it doesn't, the site still works and just
# shows the matched items without a written answer.
LLM_PROVIDER = "gemini"

# Model IDs per provider. Only the one matching LLM_PROVIDER is used.
CEREBRAS_MODEL = "gpt-oss-120b"
# Current recommended free-tier Flash model. Confirm the exact ID for
# your account in Google AI Studio — Google renames these across
# generations (gemini-2.5-flash -> gemini-3.5-flash, etc.).
GEMINI_MODEL = "gemini-3.5-flash"

# The number the assistant gives out when someone asks how to reach a
# person. Keep it identical to ORDER_NUMBER in public/config.js — that
# one builds the wa.me link, this one goes into the prompt.
ORDER_NUMBER = "923215374880"

# Longest customer question accepted, in characters. Longer questions are
# trimmed, not rejected. The real ceiling is the model's context window,
# which leaves roughly 28,000 characters of headroom.
MAX_QUERY_CHARS = "1000"

# API keys are secrets, never vars. Set whichever provider(s) you use in
# the Cloudflare dashboard (Settings -> Variables and Secrets -> Encrypt),
# or with:
#   npx wrangler secret put CEREBRAS_API_KEY
#   npx wrangler secret put GEMINI_API_KEY
# You can set both and flip between them with LLM_PROVIDER above.
